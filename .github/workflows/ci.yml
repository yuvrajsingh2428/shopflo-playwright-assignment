name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint both packages (fast gate ~60s)
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install UI dependencies
        run: npm ci
        working-directory: assignment-1-ui

      - name: Lint UI package
        run: npm run lint
        working-directory: assignment-1-ui

      - name: Typecheck UI package
        run: npx tsc --noEmit
        working-directory: assignment-1-ui

      - name: Install API dependencies
        run: npm ci
        working-directory: assignment-2-api

      - name: Lint API package
        run: npm run lint
        working-directory: assignment-2-api

      - name: Typecheck API package
        run: npx tsc --noEmit
        working-directory: assignment-2-api

  # ─────────────────────────────────────────────
  # Job 2: Playwright UI tests (Chromium)
  # ─────────────────────────────────────────────
  ui-tests:
    name: UI Tests
    needs: [lint]
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://www.saucedemo.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: assignment-1-ui

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium
        working-directory: assignment-1-ui

      - name: Run UI tests
        run: npx playwright test --project=chromium
        working-directory: assignment-1-ui

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-playwright-report
          path: assignment-1-ui/playwright-report/
          retention-days: 14

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: assignment-1-ui/test-results/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: FakeStore connectivity probe
  #
  # Standalone diagnostic job — no npm install required.
  # Runs BEFORE api-tests to capture the exact raw HTTP status codes,
  # response headers, and response bodies that the GitHub Actions runner
  # receives from fakestoreapi.com.
  #
  # All steps have continue-on-error: true so this job never blocks
  # the pipeline. Evidence is captured in the step logs.
  # ─────────────────────────────────────────────────────────────────────────
  debug-fakestore:
    name: Debug — FakeStore Connectivity
    runs-on: ubuntu-latest

    steps:
      - name: Probe all cart endpoints from GitHub Actions runner
        run: |
          echo "============================================="
          echo "Runner public IP:"
          curl -s https://api.ipify.org; echo ""
          echo "============================================="
          echo ""

          echo "=== GET /carts ==="
          curl -i --max-time 15 https://fakestoreapi.com/carts
          echo ""

          echo "=== GET /carts/1 ==="
          curl -i --max-time 15 https://fakestoreapi.com/carts/1
          echo ""

          echo "=== POST /carts ==="
          curl -i --max-time 15 -X POST https://fakestoreapi.com/carts \
            -H "Content-Type: application/json" \
            -d '{"userId":1,"date":"2024-06-01","products":[{"productId":1,"quantity":1}]}'
          echo ""

          echo "=== PUT /carts/1 ==="
          curl -i --max-time 15 -X PUT https://fakestoreapi.com/carts/1 \
            -H "Content-Type: application/json" \
            -d '{"userId":3,"date":"2024-06-01","products":[{"productId":2,"quantity":1}]}'
          echo ""

          echo "=== DELETE /carts/1 ==="
          curl -i --max-time 15 -X DELETE https://fakestoreapi.com/carts/1
          echo ""
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Job 4: Playwright API tests
  # Runs after lint AND debug-fakestore so probe
  # logs are always visible before test output.
  # ─────────────────────────────────────────────
  api-tests:
    name: API Tests
    needs: [lint, debug-fakestore]
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: https://fakestoreapi.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: assignment-2-api

      - name: Run API tests
        run: npx playwright test
        working-directory: assignment-2-api

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-playwright-report
          path: assignment-2-api/playwright-report/
          retention-days: 14

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: assignment-2-api/test-results/
          retention-days: 7

